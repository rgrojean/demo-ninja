<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Ninja</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1>Demo Ninja</h1>
      <span class="badge" id="status-badge">Ready</span>
    </header>

    <!-- Settings -->
    <section id="settings-section" class="section">
      <h2>Settings</h2>
      <div class="card">
        <label for="provider-select">AI Provider</label>
        <select id="provider-select">
          <option value="anthropic">Claude (Anthropic)</option>
          <option value="openai">OpenAI</option>
          <option value="gemini">Gemini (Google)</option>
        </select>

        <label for="model-input">Model</label>
        <input type="text" id="model-input" placeholder="e.g. claude-sonnet-4-20250514" />
        <p class="hint" id="model-hint">Leave blank for default</p>

        <label for="api-key-input">API Key</label>
        <div class="input-row">
          <input type="password" id="api-key-input" placeholder="Paste your API key" />
          <button id="toggle-key-vis" class="btn btn-sm">Show</button>
        </div>

        <button id="save-settings-btn" class="btn btn-primary btn-full">Save Settings</button>
        <div id="settings-status" class="status hidden"></div>
      </div>
    </section>

    <!-- Projects -->
    <section id="project-section" class="section">
      <h2>Projects</h2>
      <div class="card">
        <div class="toolbar">
          <label class="toggle" title="Toggle active project on/off">
            <input type="checkbox" id="project-toggle" checked />
            <span class="toggle-slider"></span>
          </label>
          <select id="project-select"></select>
          <div>
            <button id="add-project-btn" class="btn btn-sm">+ New</button>
            <button id="delete-project-btn" class="btn btn-sm btn-danger">Del</button>
          </div>
        </div>
        <div id="file-list" class="file-list"></div>
        <div class="toolbar" style="margin-top: 8px">
          <div></div>
          <div>
            <button id="export-btn" class="btn btn-sm">Export</button>
            <button id="import-btn" class="btn btn-sm">Import</button>
            <input type="file" id="import-file" accept=".json" class="hidden" />
          </div>
        </div>
      </div>
    </section>

    <!-- Capture -->
    <section id="capture-section" class="section">
      <h2>Capture & Generate</h2>
      <button id="capture-btn" class="btn btn-primary btn-full">📸 Capture Page</button>
      <div id="capture-preview" class="preview hidden">
        <img id="screenshot-preview" alt="Page screenshot" />
        <p id="capture-info" class="hint"></p>
      </div>
    </section>

    <!-- Customize -->
    <section id="customize-section" class="section hidden">
      <div class="card">
        <label for="company-input">Company Name</label>
        <input type="text" id="company-input" placeholder="e.g. Acme Corp" />

        <label for="instructions-input">Additional Instructions</label>
        <textarea id="instructions-input" rows="3" placeholder="e.g. Replace competitor names with our product, tailor messaging for enterprise buyers"></textarea>

        <button id="generate-btn" class="btn btn-primary btn-full">🤖 Generate Replacements</button>
        <div id="generate-status" class="status hidden"></div>
      </div>
    </section>

    <!-- Review & Edit -->
    <section id="review-section" class="section hidden">
      <h2>Review & Edit</h2>
      <div class="card">
        <div class="toolbar">
          <span id="editing-file-name" class="hint"></span>
          <div>
            <button id="add-row-btn" class="btn btn-sm">+ Add</button>
            <button id="save-file-btn" class="btn btn-sm btn-primary">Save</button>
          </div>
        </div>
        <div id="replacements-editor"></div>
      </div>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
